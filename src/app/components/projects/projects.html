<div>
  <div
    *ngFor="let project of projects; let i = index"
    class="min-h-screen flex flex-col lg:flex-row gap-12 lg:gap-24 py-24 border-b border-gray-100 last:border-0"
  >
    <!-- LEFT -->
    <div class="lg:w-1/3 flex flex-col justify-center">
      <div data-aos="fade-right" data-aos-duration="800">
        
        <!-- INDEX + TITLE -->
        <div class="flex items-center gap-4 mb-8">
          <span class="text-gray-400 text-sm font-bold">
            {{ getIndex(i) }}
          </span>

          <div class="h-[2px] w-8 bg-red-500"></div>

          <h3 class="text-5xl font-display uppercase tracking-tighter">
            {{ project.title }}
          </h3>
        </div>

        <!-- DESCRIPTION -->
        <p class="text-gray-500 text-lg mb-10 leading-relaxed">
          {{ project.description }}
        </p>

        <!-- TECH -->
        <div class="flex flex-wrap gap-3">
          <span
            *ngFor="let t of project.tech"
            class="px-4 py-2 bg-gray-50 border border-gray-100 rounded-xl text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-[#141414] hover:text-white transition-all"
          >
            <div class="w-1 h-1 bg-current rounded-full"></div>
            {{ t }}
          </span>
        </div>
      </div>
    </div>

    <!-- MIDDLE LINE -->
    <div class="hidden lg:flex flex-col items-center relative">
      <div class="w-[1px] h-full bg-gray-200 relative">
        <div
          class="absolute left-1/2 -translate-x-1/2 w-8 h-8 rounded-full border-2 border-white shadow-xl overflow-hidden bg-white"
          [ngStyle]="{ top: (i + 1) * 12 + '%' }"
          data-aos="zoom-in"
        >
          <img
            src="assets/profile.jpg"
            class="w-full h-full object-cover"
          />
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="lg:w-2/3 flex flex-col gap-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- MOBILE -->
        <div
          class="aspect-[9/16] rounded-[2.5rem] overflow-hidden bg-red-500/5 p-4 relative group"
          data-aos="fade-up"
          data-aos-delay="200"
        >
          <div class="absolute inset-0 bg-gradient-to-br from-red-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

          <img
            [src]="project.image"
            class="w-full h-full object-cover rounded-[2rem] shadow-2xl"
          />
        </div>

        <!-- DESKTOP -->
        <div
          class="md:col-span-2 aspect-video rounded-[3rem] overflow-hidden bg-red-500/5 p-6 relative group"
          data-aos="zoom-in"
        >
          <div class="absolute inset-0 bg-gradient-to-br from-red-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

          <img
            [src]="project.image"
            class="w-full h-full object-cover rounded-[2rem] shadow-2xl"
          />

          <!-- BADGE -->
          <div
            class="absolute -left-12 top-1/2 -translate-y-1/2 w-32 h-32 bg-[#141414] text-white rounded-full flex items-center justify-center p-4 cursor-pointer shadow-2xl z-10 hidden md:flex hover:scale-110 hover:rotate-90 transition-all duration-300"
          >
            <div class="text-[8px] font-black uppercase tracking-[0.3em] text-center leading-tight">
              Visit Project • Visit Project •
            </div>

            <div class="absolute inset-0 flex items-center justify-center">
              🌐
            </div>
          </div>
        </div>

        <!-- MOBILE 2 -->
        <div
          class="aspect-[9/16] rounded-[2.5rem] overflow-hidden bg-red-500/5 p-4 md:mt-[-100px]"
          data-aos="fade-up"
          data-aos-delay="400"
        >
          <img
            [src]="project.image"
            class="w-full h-full object-cover rounded-[2rem] shadow-2xl"
          />
        </div>
      </div>
    </div>
  </div>
</div>
