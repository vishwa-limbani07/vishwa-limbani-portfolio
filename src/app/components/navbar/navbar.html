<nav class="navbar fixed top-0 w-full z-[100] transition-all duration-500 bg-transparent py-6" [class.scrolled]="isScrolled">
  <!-- Logo -->
  <!-- <div class="navbar-logo">
     <div class="flex">
    <span class="logo-first">VISHWA </span>
    <span class="logo-last">LIMBANI</span>
    </div>
    <div class="logo-subtitle">— DIGITAL CREATOR —</div>
  </div> -->
<div class="flex items-center gap-2 cursor-pointer group">
  <div class="w-2 h-2 bg-[#141414] rounded-full flex-shrink-0 group-hover:scale-150 transition-transform"></div>
  <span class="font-bold text-lg tracking-tight">vishwa.</span>
</div>
  <!-- Nav Links -->
  <ul class="navbar-links">
    <li *ngFor="let section of sections">
      <a
        (click)="scrollTo(section)"
        class="relative text-[12px] font-semibold uppercase tracking-widest text-zinc-500 hover:text-black transition-colors duration-300 group"
        [class.active]="activeSection === section"
      >
        {{ section | uppercase }}
      </a>
    </li>
  </ul>

  <!-- Mobile Hamburger -->
  <button class="hamburger" (click)="isMenuOpen = !isMenuOpen" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="isMenuOpen">
    <a *ngFor="let section of sections" (click)="scrollTo(section); isMenuOpen=false" class="mobile-link">
      {{ section | uppercase }}
    </a>
  </div>
</nav>
