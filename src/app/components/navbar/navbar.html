<nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50">

  <div class="flex items-center gap-2 px-3 py-2 rounded-full 
              bg-[#020E1A] border border-white/10 shadow-lg backdrop-blur-md">

    <a *ngFor="let section of sections"
       (click)="scrollTo(section)"
        class="nav-pill px-5 py-2 rounded-full text-sm cursor-pointer transition duration-300 hover:text-white hover:bg-white/10"
       [ngClass]="{'active-pill': activeSection === section}">

      {{ section | titlecase }}

    </a>

  </div>

</nav>
