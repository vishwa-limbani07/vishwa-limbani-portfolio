<nav class="navbar" [class.scrolled]="isScrolled">

  <!-- Brand / Logo -->
  <div class="navbar-brand" (click)="scrollTo('home')">
    <div class="brand-dot"></div>
    <span class="brand-name">vishwa.</span>
  </div>

  <!-- Desktop Nav Links -->
  <ul class="navbar-links">
    <li *ngFor="let section of sections">
      <a
        (click)="scrollTo(section)"
        class="nav-link"
        [class.active]="activeSection === section"
      >{{ section | uppercase }}</a>
    </li>
  </ul>

  <!-- Mobile Hamburger -->
  <button class="hamburger" (click)="isMenuOpen = !isMenuOpen" [class.open]="isMenuOpen" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="isMenuOpen">
    <a *ngFor="let section of sections" (click)="scrollTo(section); isMenuOpen=false" class="mobile-link">
      {{ section | uppercase }}
    </a>
  </div>

</nav>
