<section class="relative z-10 w-full py-12">

  <!-- Section Header -->
  <div class="mb-16">
    <div class="flex items-center gap-4 mb-6" data-aos="fade-right">
      <div class="h-[1px] w-12 bg-[#c4c0b9]"></div>
      <span class="section-label">Expertise</span>
    </div>
    <h2 class="section-heading" data-aos="fade-up" data-aos-delay="100">
      Technical <span class="text-[#9f9fa9]">Stack</span>
    </h2>
  </div>

  <!-- Dark full-bleed category grid -->
  <div class="dk-wrap">
    <div class="dk-grid">
      <div class="dk-panel" *ngFor="let cat of skillCategories">

        <!-- Category header -->
        <h3 class="dk-head-title">{{ cat.name }}</h3>

        <!-- Skill list -->
        <ul class="dk-list">
          <li
            class="dk-item"
            *ngFor="let skill of cat.skills; let j = index"
            [style.--chip-i]="j"
            [style.--brand-color]="brandColor(skill.name)"
          >
            <!-- Icon: SVG mask so background-color controls the fill -->
            <span class="dk-icon-wrap">
              <span
                *ngIf="skillIcon(skill.name); else letterTpl"
                class="dk-icon"
                [style.--mask-img]="iconMaskUrl(skill.name)"
              ></span>
              <ng-template #letterTpl>
                <span class="dk-icon-letter">{{ iconFallback(skill.name) }}</span>
              </ng-template>
            </span>

            <span class="dk-name">{{ skill.name }}</span>
          </li>
        </ul>
      </div>
    </div>
  </div>

</section>
